name: CI

on:
  push:
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check src/gtracr/ examples/

      - name: Ruff format check
        run: ruff format --check src/gtracr/ examples/

      - name: Install clang-format
        run: pip install clang-format==19.1.7

      - name: clang-format check
        run: |
          find src/cpp/src src/cpp/include src/cpp/gpu \
            -name '*.cpp' -o -name '*.hpp' | \
            xargs clang-format --dry-run --Werror

  test:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-26, macos-latest, macos-26-intel, windows-latest, windows-11-arm]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        exclude:
          - os: windows-11-arm
            python-version: "3.10"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ contains(matrix.os, 'arm') && 'arm64' || 'x64' }}

      - name: Install dependencies
        run: pip install ninja meson-python pybind11 numpy scipy tqdm pytest-xdist pytest-cov

      - name: Build and install
        run: pip install . --no-build-isolation -Csetup-args=-Dnative_arch=false

      - name: Run tests
        run: pytest tests/ -vv --no-header
